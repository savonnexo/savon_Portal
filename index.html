<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Savon Nexo Employee Portal - v0.1</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
/* ============ SAVON NEXO THEME — v0.1 ============ */
:root {
  --brand-red: #E11D2A;
  --brand-red-hover: #C8161F;
  --brand-red-dark: #8B1A1F;
  --brand-red-soft: #FDE8EA;
  --brand-red-pale: #FFF5F6;

  --ink: #0E0F11;
  --ink-soft: #2A2B30;
  --slate: #5C5F66;
  --warm-gray: #8E9197;
  --border: #ECEEF1;
  --border-strong: #DDE0E5;

  --bg: #FFFFFF;
  --bg-light: #FAFAFB;
  --bg-soft: #F4F6F9;

  --success: #1E9A4F;
  --success-light: #E5F6EC;
  --danger: #DC2A37;
  --danger-light: #FDE9EB;
  --warning: #D4882F;
  --warning-light: #FFF3DE;
  --info: #2F6BC9;
  --info-light: #E4EEF9;

  --shadow-sm: 0 1px 2px rgba(14, 15, 17, 0.04);
  --shadow: 0 4px 16px rgba(14, 15, 17, 0.06);
  --shadow-md: 0 8px 28px rgba(14, 15, 17, 0.08);
  --shadow-lg: 0 16px 48px rgba(14, 15, 17, 0.12);

  --radius: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-pill: 999px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }

body {
  font-family: 'Plus Jakarta Sans', 'Inter', -apple-system, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
}

button { font-family: inherit; cursor: pointer; }
a { color: var(--brand-red); text-decoration: none; transition: color 0.15s; }
a:hover { color: var(--brand-red-hover); }

/* ============ LOGIN ============ */
.login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #FFFFFF 0%, #FFF5F6 100%);
  position: relative;
  overflow: hidden;
  padding: 20px;
}
.login-screen::before {
  content: '';
  position: absolute;
  top: -30%; right: -10%;
  width: 700px; height: 700px;
  background: radial-gradient(circle, rgba(225, 29, 42, 0.08) 0%, transparent 60%);
  border-radius: 50%;
}
.login-screen::after {
  content: '';
  position: absolute;
  bottom: -30%; left: -10%;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(225, 29, 42, 0.04) 0%, transparent 60%);
  border-radius: 50%;
}
.login-card {
  background: white;
  border-radius: var(--radius-xl);
  width: 100%; max-width: 460px;
  padding: 44px 40px;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
  position: relative;
  z-index: 2;
}
.login-brand { text-align: center; margin-bottom: 32px; }
.login-brand .logo, .login-brand .logo-wide {
  width: 100%;
  max-width: 280px;
  margin: 0 auto 18px;
  display: flex; align-items: center; justify-content: center;
}
.login-brand .logo-wide img,
.brand-logo-img { width: 100%; height: auto; display: block; max-width: 100%; }
.login-brand .tagline {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--brand-red-soft);
  color: var(--brand-red-dark);
  padding: 6px 14px;
  border-radius: var(--radius-pill);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  margin-top: 8px;
}
.login-brand .tagline::before {
  content: '';
  width: 6px; height: 6px;
  background: var(--brand-red);
  border-radius: 50%;
}

.login-card form { display: flex; flex-direction: column; gap: 16px; }
.field { display: flex; flex-direction: column; gap: 6px; }
.label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--slate);
}

input, select, textarea {
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 14px;
  background: white;
  color: var(--ink);
  transition: border-color 0.15s, box-shadow 0.15s;
  width: 100%;
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--brand-red);
  box-shadow: 0 0 0 4px rgba(225, 29, 42, 0.12);
}
textarea { resize: vertical; min-height: 80px; }

.login-error {
  background: var(--danger-light);
  color: var(--danger);
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 600;
  display: none;
}
.login-error.active { display: block; }

.demo-creds {
  margin-top: 24px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--slate);
}
.demo-creds .title {
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
  font-size: 10px;
  color: var(--warm-gray);
  text-align: center;
}
.demo-creds .cred {
  cursor: pointer;
  padding: 8px 12px;
  border-radius: var(--radius);
  margin-bottom: 4px;
  transition: background 0.15s, border-color 0.15s;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border: 1px solid transparent;
}
.demo-creds .cred:hover { background: var(--bg-light); border-color: var(--border); }
.demo-creds .cred .role {
  background: var(--brand-red-soft);
  color: var(--brand-red);
  padding: 2px 10px;
  border-radius: var(--radius-pill);
  font-size: 10px;
  font-weight: 700;
}

.login-version {
  margin-top: 22px;
  padding-top: 18px;
  border-top: 1px dashed var(--border);
  text-align: center;
  font-size: 11px;
  color: var(--warm-gray);
  letter-spacing: 0.3px;
}
.login-version strong { color: var(--brand-red); }

/* ============ BUTTONS ============ */
.btn {
  padding: 11px 22px;
  border: none;
  border-radius: var(--radius-pill);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.3px;
  transition: all 0.15s ease;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  white-space: nowrap;
  font-family: inherit;
}
.btn-primary {
  background: var(--brand-red);
  color: white;
  box-shadow: 0 4px 14px rgba(225, 29, 42, 0.25);
}
.btn-primary:hover {
  background: var(--brand-red-hover);
  transform: translateY(-1px);
  box-shadow: 0 6px 18px rgba(225, 29, 42, 0.32);
}
.btn-gold, .btn-success {
  background: var(--ink);
  color: white;
}
.btn-gold:hover, .btn-success:hover { background: #000; transform: translateY(-1px); }
.btn-outline {
  background: white;
  color: var(--ink);
  border: 1.5px solid var(--border-strong);
}
.btn-outline:hover {
  border-color: var(--brand-red);
  color: var(--brand-red);
}
.btn-secondary {
  background: white;
  color: var(--ink);
  border: 1.5px solid var(--border);
}
.btn-secondary:hover { background: var(--bg-light); border-color: var(--border-strong); }
.btn-ghost {
  background: transparent;
  color: var(--slate);
  border: 1px solid transparent;
  padding: 6px 12px;
  font-size: 12px;
}
.btn-ghost:hover { background: var(--bg-light); color: var(--ink); }
.btn-danger {
  background: transparent;
  color: var(--danger);
  border: 1.5px solid var(--danger);
}
.btn-danger:hover { background: var(--danger); color: white; }
.btn-sm { padding: 7px 14px; font-size: 12px; }
.btn-lg { padding: 14px 28px; font-size: 15px; }
.btn-block { width: 100%; }

/* ============ APP SHELL ============ */
.app {
  display: grid;
  grid-template-columns: 260px 1fr;
  min-height: 100vh;
  background: var(--bg-light);
}
.sidebar {
  background: white;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
}
.sidebar-brand {
  padding: 22px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border);
}
.sidebar-brand .logo, .sidebar-brand .logo-wide-sidebar {
  width: 100%;
  display: flex; align-items: center; justify-content: center;
}
.sidebar-brand .logo-wide-sidebar img { width: 100%; height: auto; display: block; }

.nav-section { padding: 16px 12px 4px; }
.nav-section-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--warm-gray);
  padding: 0 12px 10px;
  font-weight: 700;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-radius: var(--radius);
  color: var(--slate);
  cursor: pointer;
  transition: all 0.15s;
  font-size: 14px;
  margin-bottom: 2px;
  border: none;
  background: transparent;
  width: 100%;
  text-align: left;
  font-weight: 600;
  font-family: inherit;
  position: relative;
}
.nav-item:hover { background: var(--bg-light); color: var(--ink); }
.nav-item.active {
  background: var(--brand-red-soft);
  color: var(--brand-red);
  font-weight: 700;
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 8px; bottom: 8px;
  width: 3px;
  background: var(--brand-red);
  border-radius: 0 3px 3px 0;
}
.nav-icon { width: 18px; text-align: center; font-size: 15px; opacity: 0.85; }

.sidebar-footer {
  margin-top: auto;
  padding: 14px 12px;
  border-top: 1px solid var(--border);
}
.user-card {
  background: var(--bg-light);
  border-radius: var(--radius);
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  border: 1px solid var(--border);
}
.avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--brand-red) 0%, var(--brand-red-dark) 100%);
  color: white;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
  font-size: 14px;
  flex-shrink: 0;
}
.user-card .name { font-size: 13px; font-weight: 700; line-height: 1.2; color: var(--ink); }
.user-card .position { font-size: 11px; color: var(--slate); margin-top: 2px; }
.user-card .info { flex: 1; min-width: 0; overflow: hidden; }
.user-card .name, .user-card .position { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.logout-btn {
  background: transparent;
  border: none;
  color: var(--warm-gray);
  padding: 6px;
  border-radius: 6px;
  font-size: 16px;
  transition: all 0.15s;
}
.logout-btn:hover { background: var(--brand-red-soft); color: var(--brand-red); }

.content {
  padding: 28px 36px 60px;
  overflow-x: hidden;
  background: var(--bg-light);
}

.page-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 24px;
  gap: 20px;
  flex-wrap: wrap;
}
.page-title {
  font-size: 28px;
  font-weight: 800;
  color: var(--ink);
  line-height: 1.15;
  letter-spacing: -0.5px;
}
.page-subtitle {
  color: var(--slate);
  margin-top: 6px;
  font-size: 14px;
}
.page-actions { display: flex; gap: 10px; flex-wrap: wrap; }

/* ============ CARDS ============ */
.card {
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 22px;
  box-shadow: var(--shadow-sm);
}
.card-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 4px;
  letter-spacing: -0.2px;
}
.card-subtitle {
  color: var(--slate);
  font-size: 13px;
  margin-bottom: 16px;
}

.grid { display: grid; gap: 20px; }
.grid-2 { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
.grid-3 { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
.grid-4 { grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); }

.stat-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 22px;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
  transition: transform 0.15s, box-shadow 0.15s;
}
.stat-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 22px; left: 22px;
  width: 8px; height: 8px;
  background: var(--brand-red);
  border-radius: 50%;
}
.stat-label {
  text-transform: uppercase;
  letter-spacing: 1.2px;
  font-size: 10px;
  color: var(--slate);
  font-weight: 700;
  margin-bottom: 10px;
  padding-left: 18px;
}
.stat-number {
  font-size: 36px;
  font-weight: 800;
  color: var(--ink);
  line-height: 1;
  letter-spacing: -1px;
}
.stat-sub {
  margin-top: 6px;
  font-size: 12px;
  color: var(--slate);
}

.tag-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--brand-red-soft);
  color: var(--brand-red-dark);
  padding: 4px 10px;
  border-radius: var(--radius-pill);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.tag-label::before {
  content: '';
  width: 5px; height: 5px;
  background: var(--brand-red);
  border-radius: 50%;
}

/* ============ CLOCK ============ */
.clock-hero {
  background: linear-gradient(135deg, var(--ink) 0%, #2A2B30 100%);
  color: white;
  border-radius: var(--radius-xl);
  padding: 36px;
  text-align: center;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-lg);
}
.clock-hero::before {
  content: '';
  position: absolute;
  top: -50%; right: -10%;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(225, 29, 42, 0.25) 0%, transparent 65%);
  border-radius: 50%;
}
.clock-time {
  font-size: 64px;
  font-weight: 800;
  line-height: 1;
  letter-spacing: -2px;
  position: relative;
  z-index: 2;
}
.clock-date {
  color: rgba(255,255,255,0.7);
  margin-top: 10px;
  font-size: 15px;
  position: relative;
  z-index: 2;
}
.clock-status {
  margin: 22px 0;
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase;
  letter-spacing: 2px;
  font-weight: 600;
  position: relative;
  z-index: 2;
}
.clock-status .dot {
  display: inline-block;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--warm-gray);
  margin-right: 8px;
  vertical-align: middle;
}
.clock-status.active .dot {
  background: var(--success);
  box-shadow: 0 0 0 0 var(--success);
  animation: pulse 1.8s infinite;
}
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(30, 154, 79, 0.7); }
  70% { box-shadow: 0 0 0 14px rgba(30, 154, 79, 0); }
  100% { box-shadow: 0 0 0 0 rgba(30, 154, 79, 0); }
}
.clock-btn {
  padding: 18px 44px;
  font-size: 15px;
  border: none;
  border-radius: var(--radius-pill);
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  z-index: 2;
  font-family: inherit;
}
.clock-btn.start {
  background: var(--brand-red);
  color: white;
  box-shadow: 0 8px 24px rgba(225, 29, 42, 0.4);
}
.clock-btn.start:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 28px rgba(225, 29, 42, 0.5);
}
.clock-btn.stop {
  background: white;
  color: var(--ink);
}
.clock-btn.stop:hover { transform: translateY(-2px); }
.clock-elapsed {
  font-size: 28px;
  color: var(--brand-red);
  font-weight: 800;
  margin: 18px 0 4px;
  position: relative;
  z-index: 2;
}

/* ============ TABLES ============ */
.table-wrap {
  background: white;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.table-header {
  padding: 16px 22px;
  background: var(--ink);
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.table-title { font-size: 16px; font-weight: 700; }
.table-meta { color: rgba(255,255,255,0.7); font-size: 12px; }
.table-scroll { overflow-x: auto; max-height: 70vh; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead { background: var(--bg-light); position: sticky; top: 0; z-index: 5; }
th {
  text-align: left;
  padding: 12px 16px;
  font-size: 11px;
  font-weight: 700;
  color: var(--slate);
  text-transform: uppercase;
  letter-spacing: 1px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
tbody tr:hover { background: var(--brand-red-pale); }

.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: var(--radius-pill);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.badge-gold, .badge-red { background: var(--brand-red); color: white; }
.badge-success { background: var(--success-light); color: var(--success); }
.badge-danger { background: var(--danger-light); color: var(--danger); }
.badge-warning { background: var(--warning-light); color: var(--warning); }
.badge-info { background: var(--info-light); color: var(--info); }
.badge-muted { background: var(--bg-soft); color: var(--slate); }

/* ============ MODAL ============ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(14, 15, 17, 0.55);
  backdrop-filter: blur(8px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
}
.modal-overlay.active { display: flex; }
.modal {
  background: white;
  border-radius: var(--radius-xl);
  width: 100%;
  max-width: 580px;
  max-height: 92vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: slideUp 0.25s ease-out;
}
.modal.modal-lg { max-width: 760px; }
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.modal-header {
  padding: 22px 26px;
  background: var(--ink);
  color: white;
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-title { font-size: 18px; font-weight: 700; }
.modal-close {
  background: none; border: none; color: white;
  font-size: 22px; width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.modal-close:hover { background: rgba(255,255,255,0.15); }
.modal-body { padding: 24px 26px; }
.modal-footer {
  padding: 16px 26px 22px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.form-grid .full { grid-column: span 2; }

/* ============ ANNOUNCEMENTS ============ */
.announcement {
  background: white;
  border: 1px solid var(--border);
  border-left: 4px solid var(--brand-red);
  padding: 18px 22px;
  border-radius: 0 var(--radius) var(--radius) 0;
  margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
}
.announcement.pinned {
  border-left-color: var(--ink);
  background: linear-gradient(90deg, var(--brand-red-pale) 0%, white 100%);
}
.announcement-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.announcement-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--ink);
}
.announcement-date { font-size: 12px; color: var(--warm-gray); }
.announcement-body { color: var(--ink-soft); line-height: 1.6; white-space: pre-wrap; }
.announcement-author { margin-top: 10px; font-size: 12px; color: var(--slate); }
.pin-marker { color: var(--brand-red); margin-right: 6px; }

/* ============ CALENDAR ============ */
.cal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;

  display: flex;
  gap: 16px;
  margin-top: 18px;
  position: relative;
  padding-top: 40px;
  justify-content: center;
}
/* Vertical stem from parent down to the horizontal junction */
.org-children::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 2px;
  height: 20px;
  background: var(--brand-red);
  z-index: 1;
}
/* Each child: vertical drop from junction line down to node */
.org-children > .org-node-wrap::before {
  content: '';
  position: absolute;
  top: -20px;
  left: 50%;
  transform: translateX(-50%);
  width: 2px;
  height: 20px;
  background: var(--brand-red);
  z-index: 1;
}
/* Each child: horizontal segment of the junction bar
   First child  → line from its center rightward to the gap midpoint
   Last child   → line from gap midpoint leftward to its center
   Middle child → line spanning across both gap midpoints
   Only child   → no horizontal line (single straight drop) */
.org-children > .org-node-wrap::after {
  content: '';
  position: absolute;
  top: -20px;
  height: 2px;
  background: var(--brand-red);
  z-index: 1;
}
.org-children > .org-node-wrap:only-child::after {
  display: none;
}
.org-children > .org-node-wrap:first-child:not(:only-child)::after {
  left: 50%;
  right: -8px;
}
.org-children > .org-node-wrap:last-child:not(:only-child)::after {
  left: -8px;
  right: 50%;
}
.org-children > .org-node-wrap:not(:first-child):not(:last-child)::after {
  left: -8px;
  right: -8px;
}

function uid(prefix = 'id') {
  return prefix + '_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
}
function todayISO() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

async function loadFromSupabase() {
  const [p, te, sh, an, to, ta, ts, ac, al] = await Promise.all([
    _sb.from('profiles').select('*'),
    _sb.from('time_entries').select('*'),
    _sb.from('shifts').select('*'),
    _sb.from('announcements').select('*'),
    _sb.from('time_off').select('*'),
    _sb.from('tastings').select('*'),
    _sb.from('timesheets').select('*'),
    _sb.from('announcement_comments').select('*').order('created_at', { ascending: true }),
    _sb.from('tasting_audit').select('*').order('changed_at', { ascending: false }),
  ]);
  DB = {
    users:         (p.data  ||[]).map(_fromDB.profiles),
    timeEntries:   (te.data ||[]).map(_fromDB.time_entries),
    shifts:        (sh.data ||[]).map(_fromDB.shifts),
    announcements: (an.data ||[]).map(_fromDB.announcements),
    timeOff:       (to.data ||[]).map(_fromDB.time_off),
    tastings:      (ta.data ||[]).map(_fromDB.tastings),
    timesheets:    (ts.data ||[]).map(_fromDB.timesheets),
    annComments:   (ac.data ||[]).map(_fromDB.ann_comments),
    tastingAudit:  (al.data ||[]).map(_fromDB.tasting_audit),
    sessionUserId: null
  };
}

function _sbPush(table, obj) {
  _sb.from(table).insert(obj).then(({error}) => { if (error) showToast('Sync error: ' + error.message, 'error'); });
}
function _sbUpdate(table, obj, id) {
  _sb.from(table).update(obj).eq('id', id).then(({error}) => { if (error) showToast('Sync error: ' + error.message, 'error'); });
}
function _sbDelete(table, id) {
  _sb.from(table).delete().eq('id', id).then(({error}) => { if (error) showToast('Sync error: ' + error.message, 'error'); });
}
function _sbUpsert(table, obj) {
  _sb.from(table).upsert(obj).then(({error}) => { if (error) showToast('Sync error: ' + error.message, 'error'); });
}

let DB = null;

async function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const err = document.getElementById('login-error');
  const btn = e.target.querySelector('button[type=submit]');
  btn.disabled = true; btn.textContent = 'Signing in…';
  const { data, error } = await _sb.auth.signInWithPassword({ email, password });
  btn.disabled = false; btn.textContent = 'Sign In';
  if (error || !data.user) {
    err.textContent = 'Invalid email or password.';
    err.classList.add('active');

  err.classList.remove('active');

  hideLoadingOverlay();
  renderApp();

function addDaysISO(days) {
  const d = new Date();
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0,10);
}

function generateSampleShifts() {
  const shifts = [];
  const users = ['u_portia', 'u_mike', 'u_jenna', 'u_david'];
  const positions = { u_portia: 'Wine & Spirits Floor', u_mike: 'Cashier', u_jenna: 'Stocking', u_david: 'Floor Manager' };
  for (let i = -3; i < 14; i++) {
    const date = addDaysISO(i);
    users.forEach((uid_, idx) => {
      // randomize: skip ~30% of days
      if ((i + idx) % 3 === 1) return;
      shifts.push({
        id: 'sh_' + i + '_' + uid_,
        userId: uid_,
        date,
        start: idx % 2 === 0 ? '09:00' : '13:00',
        end: idx % 2 === 0 ? '17:00' : '21:00',
        position: positions[uid_],
        notes: ''
      });
    });
  }
  return shifts;
}

// ============ TIME / DATE HELPERS ============
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso.length === 10 ? iso + 'T12:00:00' : iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function fmtDateShort(iso) {
  if (!iso) return '';
  const d = new Date(iso.length === 10 ? iso + 'T12:00:00' : iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function fmtDay(iso) {
  if (!iso) return '';
  const d = new Date(iso.length === 10 ? iso + 'T12:00:00' : iso);
  return ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()];
}
function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}
// Extract local HH:MM from an ISO timestamp (avoids the UTC-offset display bug)
function localHHMM(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
// Extract local YYYY-MM-DD from an ISO timestamp
function localDateStr(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function fmtTimeRange(startStr, endStr) {
  const fmt = t => {
    if (!t) return '';
    const [h, m] = t.split(':');
    const hour = parseInt(h);
    const period = hour >= 12 ? 'PM' : 'AM';
    const dh = hour === 0 ? 12 : hour > 12 ? hour - 12 : hour;
    return dh + ':' + m + ' ' + period;
  };
  return fmt(startStr) + ' – ' + fmt(endStr);
}
function fmtDuration(ms) {
  if (!ms || ms < 0) return '0h 0m';
  const totalMin = Math.floor(ms / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  return h + 'h ' + m + 'm';
}
function fmtDurationHM(ms) {
  if (!ms || ms < 0) return '0:00:00';
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}
function getWeekRange(offset = 0) {
  const d = new Date();
  d.setHours(0,0,0,0);
  const dow = d.getDay();
  const daysSinceMonday = dow === 0 ? 6 : dow - 1;
  const monday = new Date(d);
  monday.setDate(d.getDate() - daysSinceMonday + (offset * 7));
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  const fmt = x => x.getFullYear() + '-' + String(x.getMonth()+1).padStart(2,'0') + '-' + String(x.getDate()).padStart(2,'0');
  return { start: fmt(monday), end: fmt(sunday) };
}
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}
function initials(name) {
  if (!name) return '?';
  return name.split(/\s+/).map(p => p[0]).slice(0, 2).join('').toUpperCase();
}

  const emailVal  = document.getElementById('sr-email').value.trim();
  const company   = document.getElementById('sr-company').value.trim();
  const dist      = document.getElementById('sr-distributor').value.trim();
  const loc       = document.getElementById('sr-location').value.trim() || 'TBD';

    id: uid('sr'),
    date: dateVal, day: fmtDay(dateVal),
    from: fromVal, to: toVal,
    location: loc, distributor: dist, supplier: company, rep: nameVal,
    products,
    status: 'pending',
    approvalNote: notes, suggestedDate: '', suggestedFrom: '', suggestedTo: '', suggestedLocation: '',
    submittedBy: null, submittedAt: new Date().toISOString(),
    source: 'supplier',
    requesterName: nameVal, requesterEmail: emailVal, requesterCompany: company,
  };

  // Save to Supabase directly (no auth session for supplier portal)
  try {
    await _sb.from('tastings').insert(_toDB.tastings(data));
  } catch(err) {
    console.warn('Supabase insert error:', err);

  // Email Portia
  emailTastingApproval(data, nameVal + ' (' + company + ')');

function renderLogin(root) {
  root.innerHTML = `
    <div class="login-screen">
      <div class="login-card">
        <div class="login-brand">
          <div class="logo-wide">${LOGO_IMG}</div>
          <div class="tagline">EMPLOYEE PORTAL</div>
        </div>
        <form onsubmit="handleLogin(event)">
          <div class="field">
            <label class="label">Email</label>
            <input type="email" id="login-email" required autofocus placeholder="you@savonnexo.com">
          </div>
          <div class="field">
            <label class="label">Password</label>
            <input type="password" id="login-password" required placeholder="••••••••">
          </div>
          <div class="login-error" id="login-error"></div>
          <button class="btn btn-primary btn-block btn-lg" type="submit">Sign In</button>
        </form>
        <div class="login-version">
          <strong>Version 0.1</strong> &nbsp;·&nbsp; Built by Savon Nexo LLC
          <div style="margin-top:4px;">Business Intelligence · Data Analytics · Web Solutions</div>
        </div>
      </div>
    </div>
  `;
}

function renderSidebar(u) {
  const isAdminRole = u.role === 'admin';
  const hasTasting = u.tastingAccess || isAdminRole;
  // A manager is anyone who has direct reports
  const isManager = DB.users.some(x => x.managerId === u.id);
  const nav = [
    { id: 'dashboard', icon: '🏠', label: 'Dashboard' },
    { id: 'clock', icon: '⏱', label: 'Clock In/Out' },
    { id: 'mytime', icon: '📋', label: 'My Timecard' },
    { id: 'timesheet', icon: '📝', label: 'Weekly Timesheet' },
    { id: 'schedule', icon: '📅', label: 'Schedule' },
    { id: 'announcements', icon: '📣', label: 'Announcements' },
    { id: 'timeoff', icon: '🌴', label: 'Time Off' },
    { id: 'orgchart', icon: '🏢', label: 'Org Chart' }
  ];
  if (hasTasting) nav.push({ id: 'tastings', icon: '🍷', label: 'Tastings' });
  nav.push({ id: 'profile', icon: '⚙', label: 'My Profile' });

  let adminNav = [];
  if (isManager || isAdminRole) {
    adminNav.push({ id: 'tsapprovals', icon: '✍', label: 'Timesheet Approvals' });
  }
  // Tasting Approvals: managers with tasting access see pending requests
  if ((isManager || isAdminRole) && hasTasting) {
    const pendingTastings = DB.tastings.filter(t => t.status === 'pending').length;
    adminNav.push({ id: 'tastingapprovals', icon: '🍷', label: 'Tasting Approvals' + (pendingTastings > 0 ? ` (${pendingTastings})` : '') });
  }
  if (isAdminRole) {
    adminNav = adminNav.concat([
      { id: 'employees', icon: '👥', label: 'Employees' },
      { id: 'alltime', icon: '📊', label: 'Time Records' },
      { id: 'approvals', icon: '✓', label: 'Time-Off Approvals' },
      { id: 'allshifts', icon: '🗓', label: 'Manage Shifts' },
      { id: 'tastingaudit', icon: '📋', label: 'Tasting Audit Trail' }
    ]);
  }

  return `
    <div class="sidebar-brand">
      <div class="logo-wide-sidebar">${LOGO_IMG}</div>
    </div>
    <nav style="flex:1; overflow-y: auto;">
      <div class="nav-section">
        <div class="nav-section-title">Workspace</div>
        ${nav.map(n => `
          <button class="nav-item ${currentView === n.id ? 'active' : ''}" onclick="navigate('${n.id}')">
            <span class="nav-icon">${n.icon}</span>
            <span>${n.label}</span>
          </button>`).join('')}
      </div>
      ${adminNav.length ? `
        <div class="nav-section">
          <div class="nav-section-title">HR / Admin</div>
          ${adminNav.map(n => `
            <button class="nav-item ${currentView === n.id ? 'active' : ''}" onclick="navigate('${n.id}')">
              <span class="nav-icon">${n.icon}</span>
              <span>${n.label}</span>
            </button>`).join('')}
        </div>
      ` : ''}
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="avatar">${initials(u.name)}</div>
        <div class="info">
          <div class="name">${escapeHtml(u.name)}</div>
          <div class="position">${escapeHtml(u.position)}</div>
        </div>
        <button class="logout-btn" onclick="logout()" title="Sign out">⎋</button>
      </div>
      <div class="version-footer">
        <strong>Version ${APP_VERSION}</strong><br>
        Built by Savon Nexo LLC
      </div>
    </div>
  `;
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('mobile-overlay').classList.toggle('active');
}

function navigate(view) {
  currentView = view;
  if (window.innerWidth <= 900) toggleSidebar();
  renderApp();
}

function renderView() {
  const host = document.getElementById('view');
  if (clockTickerInterval) { clearInterval(clockTickerInterval); clockTickerInterval = null; }
  switch(currentView) {
    case 'dashboard': renderDashboard(host); break;
    case 'clock': renderClock(host); break;
    case 'mytime': renderMyTime(host); break;
    case 'timesheet': renderTimesheet(host); break;
    case 'schedule': renderSchedule(host); break;
    case 'announcements': renderAnnouncements(host); break;
    case 'timeoff': renderTimeOff(host); break;
    case 'orgchart': renderOrgChart(host); break;
    case 'tastings': renderTastings(host); break;
    case 'tastingapprovals': renderTastingApprovals(host); break;
    case 'tastingaudit': isAdmin() ? renderTastingAudit(host) : renderDashboard(host); break;
    case 'profile': renderProfile(host); break;
    case 'tsapprovals': renderTimesheetApprovals(host); break;
    case 'employees': isAdmin() ? renderEmployees(host) : renderDashboard(host); break;
    case 'alltime': isAdmin() ? renderAllTime(host) : renderDashboard(host); break;
    case 'approvals': isAdmin() ? renderApprovals(host) : renderDashboard(host); break;
    case 'allshifts': isAdmin() ? renderAllShifts(host) : renderDashboard(host); break;
    default: renderDashboard(host);
  }
}

// ============ VIEW: DASHBOARD ============
function renderDashboard(host) {
  const u = currentUser();
  const today = todayISO();
  const myEntries = DB.timeEntries.filter(e => e.userId === u.id);
  const openEntry = myEntries.find(e => !e.clockOut);
  const week = getWeekRange();
  const weekEntries = myEntries.filter(e => e.clockIn.slice(0,10) >= week.start && e.clockIn.slice(0,10) <= week.end);
  let weekMs = 0;
  weekEntries.forEach(e => {
    const out = e.clockOut ? new Date(e.clockOut) : new Date();

function renderClock(host) {

  host.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Time Clock</div>
        <div class="page-subtitle">Sign in for the day, take a break, sign out</div>
      </div>
    </div>
    <div class="clock-hero" id="clock-hero">
      <div class="clock-time" id="big-clock"></div>
      <div class="clock-date" id="big-date"></div>
      <div class="clock-status ${openEntry ? 'active' : ''}">
        <span class="dot"></span>
        ${openEntry ? 'On the clock since ' + fmtTime(openEntry.clockIn) : 'Not clocked in'}
      </div>
      ${openEntry ? `<div class="clock-elapsed" id="elapsed-time">0:00:00</div>` : ''}
      <div style="margin-top: 16px;">
        ${openEntry
          ? `<button class="clock-btn stop" onclick="clockOut()">⏸ Clock Out</button>`
          : `<button class="clock-btn start" onclick="clockIn()">▶ Clock In</button>`}

        ${renderTimeEntriesTable(myEntries.slice().sort((a,b) => b.clockIn.localeCompare(a.clockIn)).slice(0, 7), false)}
      </div>
    </div>
  `;

  function tick() {
    const now = new Date();
    const big = document.getElementById('big-clock');

    if (!big) return;
    big.textContent = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit' });
    dateEl.textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

      const el = document.getElementById('elapsed-time');

function clockIn() {
  const u = currentUser();
  const open = DB.timeEntries.find(e => e.userId === u.id && !e.clockOut);
  if (open) { showToast('Already clocked in', 'error'); return; }
  const entry = { id: uid('te'), userId: u.id, clockIn: new Date().toISOString(), clockOut: null, note: '', edited: false };
  DB.timeEntries.push(entry);
  _sbPush('time_entries', _toDB.time_entries(entry));
  showToast('Clocked in', 'success');
  renderView();
}

function clockOut() {
  const u = currentUser();
  const open = DB.timeEntries.find(e => e.userId === u.id && !e.clockOut);
  if (!open) { showToast('No active session', 'error'); return; }
  open.clockOut = new Date().toISOString();
  _sbUpdate('time_entries', { clock_out: open.clockOut }, open.id);
  showToast('Clocked out', 'success');
  renderView();
}

// Kronos-style timecard
let kronosWeekOffset = 0;
function renderMyTime(host) {
  const u = currentUser();
  const r = getWeekRange(kronosWeekOffset);
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(r.start + 'T12:00:00');
    d.setDate(d.getDate() + i);
    days.push(d.toISOString().slice(0,10));
  }

  // For each day, find entries (could be multiple = morning + afternoon)
  function dayPunches(date) {
    const entries = DB.timeEntries.filter(e => e.userId === u.id && localDateStr(e.clockIn) === date)
      .sort((a,b) => a.clockIn.localeCompare(b.clockIn));
    const isToday = date === todayISO();
    const now = new Date();
    const punches = { in1:'', out1:'', in2:'', out2:'', shift1: 0, shift2: 0, inProgress: false };
    if (entries[0]) {
      punches.in1 = localHHMM(entries[0].clockIn);
      if (entries[0].clockOut) {
        punches.out1 = localHHMM(entries[0].clockOut);
        punches.shift1 = (new Date(entries[0].clockOut) - new Date(entries[0].clockIn)) / 3600000;
      } else if (isToday) {
        // Still clocked in — show running total
        punches.shift1 = (now - new Date(entries[0].clockIn)) / 3600000;
        punches.inProgress = true;
      }
    }
    if (entries[1]) {
      punches.in2 = localHHMM(entries[1].clockIn);
      if (entries[1].clockOut) {
        punches.out2 = localHHMM(entries[1].clockOut);
        punches.shift2 = (new Date(entries[1].clockOut) - new Date(entries[1].clockIn)) / 3600000;
      } else if (isToday) {
        punches.shift2 = (now - new Date(entries[1].clockIn)) / 3600000;
        punches.inProgress = true;
      }
    }
    punches.daily = punches.shift1 + punches.shift2;
    return punches;
  }

  let periodTotal = 0;
  const rows = days.map(d => {
    const p = dayPunches(d);
    periodTotal += p.daily;
    return { date: d, ...p, periodTotal };
  });

  // Check if there's a submitted timesheet for this week
  const submittedTs = DB.timesheets.find(t => t.userId === u.id && t.weekStart === r.start);
  const statusBadge = submittedTs
    ? `<span class="badge ${submittedTs.status === 'approved' ? 'badge-success' : submittedTs.status === 'rejected' ? 'badge-danger' : 'badge-warning'}">${submittedTs.status.toUpperCase()}</span>`

        </button>
      </div>
      <div class="kronos-bar-meta">

        <select class="kronos-period-select" onchange="setKronosWeek(parseInt(this.value))">
          <option value="0" ${kronosWeekOffset === 0 ? 'selected' : ''}>Current Pay Period</option>
          <option value="-1" ${kronosWeekOffset === -1 ? 'selected' : ''}>Previous Pay Period</option>
          <option value="-2" ${kronosWeekOffset === -2 ? 'selected' : ''}>2 weeks ago</option>
          <option value="-3" ${kronosWeekOffset === -3 ? 'selected' : ''}>3 weeks ago</option>
          <option value="1" ${kronosWeekOffset === 1 ? 'selected' : ''}>Next Pay Period</option>
        </select>
      </div>
      <div class="kronos-bar-right">
        <button class="kronos-action" onclick="window.print()" title="Print Timecard"><span>🖨</span><span>Print<br>Timecard</span></button>
        <button class="kronos-action" onclick="renderView()" title="Refresh"><span>🔄</span><span>Refresh</span></button>
        <button class="kronos-action" onclick="recalcKronos()" title="Calculate Totals"><span>🧮</span><span>Calculate<br>Totals</span></button>
        <button class="kronos-action kronos-action-save" onclick="saveKronosWeek()" title="Save"><span>💾</span><span>Save</span></button>
      </div>
    </div>

    <div class="kronos-table-wrap">
      <table class="kronos-table">
        <thead>
          <tr>
            <th style="width:46px;"></th>
            <th>Date</th>
            <th>Pay Code</th>
            <th style="width:80px;">Amount</th>
            <th>In</th>
            <th>Transfer</th>
            <th>Out</th>

          </tr>
        </thead>
        <tbody>
          ${rows.map((row, i) => {
            const isToday = row.date === todayISO();
            const isPast = row.date < todayISO();
            const shiftStr = row.daily > 0 ? (row.inProgress ? row.daily.toFixed(2) + '…' : row.daily.toFixed(2)) : '';

                <td></td>

          }).join('')}

            <td colspan="10" style="text-align:right;padding-right:14px;color:var(--burgundy-dark);font-weight:700;">PERIOD TOTAL</td>
            <td colspan="2"></td>
            <td class="kronos-total kronos-total-period" style="font-size:14px;">${periodTotal.toFixed(2)}</td>
            <td></td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="grid grid-3" style="margin-top: 24px;">
      <div class="stat-card">
        <div class="stat-label">Period Total</div>
        <div class="stat-number">${periodTotal.toFixed(1)}<span style="font-size:18px;color:var(--slate);"> hrs</span></div>
        <div class="stat-sub">${fmtDateShort(r.start)} – ${fmtDateShort(r.end)}</div>
      </div>

        <div class="stat-number" style="font-size:22px;padding-top:8px;">${submittedTs ? submittedTs.status[0].toUpperCase() + submittedTs.status.slice(1) : 'Draft'}</div>
        <div class="stat-sub">${submittedTs && submittedTs.reviewedAt ? 'Reviewed ' + fmtDateShort(submittedTs.reviewedAt) : submittedTs && submittedTs.submittedAt ? 'Submitted ' + fmtDateShort(submittedTs.submittedAt) : 'Not yet submitted'}</div>
      </div>

function submitTimesheet() {
  const u = currentUser();
  const r = getWeekRange(kronosWeekOffset);
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(r.start + 'T12:00:00');
    d.setDate(d.getDate() + i);
    days.push(d.toISOString().slice(0,10));
  }
  const entries = days.map(date => {
    const dayEntries = DB.timeEntries.filter(e => e.userId === u.id && localDateStr(e.clockIn) === date).sort((a,b) => a.clockIn.localeCompare(b.clockIn));
    return {
      date,
      in1: dayEntries[0] ? localHHMM(dayEntries[0].clockIn) : '',
      out1: dayEntries[0] && dayEntries[0].clockOut ? localHHMM(dayEntries[0].clockOut) : '',
      in2: dayEntries[1] ? localHHMM(dayEntries[1].clockIn) : '',
      out2: dayEntries[1] && dayEntries[1].clockOut ? localHHMM(dayEntries[1].clockOut) : '',
      payCode: (dayEntries[0] || dayEntries[1]) ? 'Regular' : 'Off',
      notes: ''
    };
  });
  let ts = DB.timesheets.find(t => t.userId === u.id && t.weekStart === r.start);
  if (ts) {
    ts.entries = entries; ts.status = 'pending'; ts.submittedAt = new Date().toISOString();
    ts.reviewedBy = null; ts.reviewedAt = null; ts.reviewNote = '';
    _sbUpsert('timesheets', _toDB.timesheets(ts));
    showToast('Timesheet re-submitted for approval', 'success');
  } else {
    ts = { id: uid('ws'), userId: u.id, weekStart: r.start, entries, status: 'pending',
           submittedAt: new Date().toISOString(), reviewedBy: null, reviewedAt: null, reviewNote: '' };
    DB.timesheets.push(ts);
    _sbPush('timesheets', _toDB.timesheets(ts));
    showToast('Timesheet submitted for approval', 'success');
  }
  renderView();
}

function renderSchedule(host) {
  const u = currentUser();
  if (!calMonth) calMonth = todayISO().slice(0, 7);
  const [yr, mo] = calMonth.split('-').map(Number);
  const firstOfMonth = new Date(yr, mo - 1, 1);
  const lastOfMonth = new Date(yr, mo, 0);
  const startDow = firstOfMonth.getDay();
  const daysInMonth = lastOfMonth.getDate();
  const prevMonthDays = new Date(yr, mo - 1, 0).getDate();

  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let cells = [];

  // Leading days (previous month)
  for (let i = startDow - 1; i >= 0; i--) {
    const d = new Date(yr, mo - 2, prevMonthDays - i);
    cells.push({ date: d, otherMonth: true });
  }
  for (let i = 1; i <= daysInMonth; i++) {
    cells.push({ date: new Date(yr, mo - 1, i), otherMonth: false });
  }
  while (cells.length % 7 !== 0) {
    const last = cells[cells.length - 1].date;
    cells.push({ date: new Date(last.getTime() + 86400000), otherMonth: true });
  }

  function isoOf(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
  const todayIso = todayISO();

  const myShifts = DB.shifts.filter(s => s.userId === u.id);
  const myTimeOff = DB.timeOff.filter(t => t.userId === u.id && t.status !== 'denied');
  const myTastings = u.tastingAccess || u.role === 'admin' ? DB.tastings : [];

  function eventsFor(iso) {
    const ev = [];
    myShifts.filter(s => s.date === iso).forEach(s =>
      ev.push({ type: 'shift', label: fmtTimeRange(s.start, s.end) + ' ' + s.position }));
    myTimeOff.filter(t => iso >= t.startDate && iso <= t.endDate).forEach(t =>
      ev.push({ type: 'timeoff', label: (t.status === 'pending' ? '⏳ ' : '✓ ') + t.type }));
    if (u.tastingAccess || u.role === 'admin') {
      myTastings.filter(tt => tt.date === iso).slice(0, 3).forEach(tt =>
        ev.push({ type: 'tasting', label: '🍷 ' + (tt.location || 'Tasting') }));
    }
    return ev;
  }

  host.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">My Schedule</div>

        <button class="btn btn-secondary btn-sm" onclick="changeMonth(-1)">‹ Prev</button>
        <button class="btn btn-secondary btn-sm" onclick="changeMonth(0)">Today</button>
        <button class="btn btn-secondary btn-sm" onclick="changeMonth(1)">Next ›</button>

              <div style="color: var(--burgundy); font-weight: 600;">${fmtTimeRange(s.start, s.end)}</div>
            </div>
          `).join('');
        })()}

        <div class="card-title">Time Off</div>

        ${(() => {
          const recent = DB.timeOff.filter(t => t.userId === u.id).sort((a,b) => b.startDate.localeCompare(a.startDate)).slice(0, 5);
          if (recent.length === 0) return '<div style="color:var(--warm-gray); font-style:italic; padding:12px 0;">No time-off requests.</div>';
          return recent.map(t => `
            <div style="padding: 10px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items:center;">
              <div>
                <div style="font-weight: 600;">${escapeHtml(t.type)}</div>

            </div>
          `).join('');
        })()}
      </div>
    </div>
  `;
}

function changeMonth(dir) {
  if (dir === 0) {
    calMonth = todayISO().slice(0, 7);
  } else {
    const [yr, mo] = calMonth.split('-').map(Number);
    const d = new Date(yr, mo - 1 + dir, 1);
    calMonth = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  }
  renderView();
}

function exportMySchedule() {
  const u = currentUser();
  const myShifts = DB.shifts.filter(s => s.userId === u.id).sort((a,b) => a.date.localeCompare(b.date));
  const rows = myShifts.map(s => ({
    Date: s.date, Day: fmtDay(s.date), Start: s.start, End: s.end, Position: s.position, Notes: s.notes
  }));
  downloadExcel(rows, 'My_Schedule_' + u.name.replace(/\s/g, '_') + '_' + todayISO() + '.xlsx', 'Schedule');
}

function toggleAnnComments(annId) {
  const el = document.getElementById('comments-' + annId);
  if (!el) return;
  const showing = el.style.display !== 'none';
  el.style.display = showing ? 'none' : 'block';
  if (!showing) { setTimeout(() => { const inp = document.getElementById('comment-input-' + annId); if (inp) inp.focus(); }, 50); }
}

function likeAnnouncement(annId) {
  const u = currentUser();
  const a = DB.announcements.find(x => x.id === annId);
  if (!a) return;
  const likes = [...(a.likes||[])];
  const idx = likes.indexOf(u.id);
  if (idx >= 0) likes.splice(idx, 1); else likes.push(u.id);
  a.likes = likes;
  _sbUpdate('announcements', { likes }, annId);
  // Re-render just this card's like button without full page refresh
  renderView();
}

function submitAnnComment(annId) {
  const u = currentUser();
  const inp = document.getElementById('comment-input-' + annId);
  if (!inp) return;
  const body = inp.value.trim();
  if (!body) return;
  const comment = { id: uid('ac'), announcementId: annId, userId: u.id, userName: u.name, body, createdAt: new Date().toISOString() };
  DB.annComments = [...(DB.annComments||[]), comment];
  _sbPush('announcement_comments', _toDB.ann_comments(comment));
  renderView();
  // Re-open the comments section after re-render
  setTimeout(() => { toggleAnnComments(annId); }, 50);
}

  DB.annComments = (DB.annComments||[]).filter(c => c.id !== commentId);

  e.preventDefault();

let tastingSort = 'date', tastingDir = 'asc';

        </div>

          <select id="tasting-location" onchange="tastingFilter.loc=this.value; renderTastingTable()">

            <option value="past" ${tastingFilter.tf==='past'?'selected':''}>Past</option>
            <option value="all" ${tastingFilter.tf==='all'?'selected':''}>All Time</option>
          </select>
        </div>
      </div>
    </div>

    <div id="tasting-table"></div>
  `;
  renderTastingTable();

function renderTastingTable() {
  const u = currentUser();
  const search = tastingFilter.search.toLowerCase().trim();
  const loc = tastingFilter.loc;
  const tf = tastingFilter.tf;
  const today = todayISO(); const wk = getWeekRange(); const nk = getWeekRange(1);

  let items = DB.tastings.filter(t => {
    if (t.status === 'pending' || t.status === 'denied') return false; // hide unapproved
    if (loc && t.location !== loc) return false;
    if (tf === 'upcoming' && t.date < today) return false;
    if (tf === 'this-week' && (t.date < wk.start || t.date > wk.end)) return false;
    if (tf === 'next-week' && (t.date < nk.start || t.date > nk.end)) return false;
    if (tf === 'past' && t.date >= today) return false;
    if (tf === 'this-month' && !t.date.startsWith(today.slice(0,7))) return false;
    if (search) {
      const hay = (t.location + ' ' + t.distributor + ' ' + t.supplier + ' ' + t.rep + ' ' + (t.products || []).join(' ')).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  items.sort((a, b) => {
    const av = a[tastingSort] || ''; const bv = b[tastingSort] || '';
    if (av < bv) return tastingDir === 'asc' ? -1 : 1;
    if (av > bv) return tastingDir === 'asc' ? 1 : -1;
    return (a.from || '').localeCompare(b.from || '');
  });

  const host = document.getElementById('tasting-table');
  host.innerHTML = `
    <div class="table-wrap">
      <div class="table-header">
        <div class="table-title">Scheduled Tastings</div>
        <div class="table-meta">${items.length} event${items.length === 1 ? '' : 's'}</div>
      </div>
      <div class="table-scroll">
        <table>
          <thead><tr>
            <th>Date</th><th>Day</th><th>Time</th><th>Location</th>
            <th>Distributor</th><th>Supplier</th><th>Rep</th><th>Products</th>
            <th>Status</th><th></th>
          </tr></thead>
          <tbody>
            ${items.length === 0
              ? '<tr><td colspan="10"><div class="empty"><div class="empty-icon">🍇</div><div>No tastings match your filters.</div></div></td></tr>'
              : items.map(t => {
                const status = (() => {
                  if (t.date === today) return { label: 'Today', cls: 'badge-gold' };
                  if (t.date >= wk.start && t.date <= wk.end && t.date > today) return { label: 'This Week', cls: 'badge-warning' };
                  if (t.date >= nk.start && t.date <= nk.end) return { label: 'Next Week', cls: 'badge-info' };
                  if (t.date < today) return { label: 'Past', cls: 'badge-muted' };
                  return { label: 'Upcoming', cls: 'badge-muted' };
                })();
                const products = (t.products || []).filter(p => p);
                return `
                  <tr>
                    <td style="white-space:nowrap;font-weight:600;color:var(--burgundy-dark);">${fmtDate(t.date)}</td>
                    <td style="font-style:italic;color:var(--slate);">${escapeHtml(t.day || fmtDay(t.date))}</td>
                    <td style="white-space:nowrap;">${fmtTimeRange(t.from, t.to)}</td>
                    <td><strong>${escapeHtml(t.location)}</strong></td>
                    <td>${escapeHtml(t.distributor) || '—'}</td>
                    <td>${escapeHtml(t.supplier) || '—'}</td>
                    <td>${escapeHtml(t.rep) || '—'}</td>
                    <td style="max-width:280px;">${products.map(p => '<span class="product-pill">' + escapeHtml(p) + '</span>').join(' ') || '—'}</td>
                    <td><span class="badge ${status.cls}">${status.label}</span></td>
                    <td><button class="btn btn-sm btn-ghost" onclick="openTastingModal('${t.id}')">Edit</button> <button class="btn btn-sm btn-ghost" onclick="deleteTasting('${t.id}')" style="color:var(--danger);">×</button></td>
                  </tr>
                `;
              }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function saveTasting(e, id) {
  e.preventDefault();
  const u = currentUser();
  const products = [];
  for (let i = 1; i <= 6; i++) {
    const v = document.getElementById('t-p' + i).value.trim();
    if (v) products.push(v);
  }
  const existing = id ? DB.tastings.find(x => x.id === id) : null;
  // Portia (the tasting approver) can add directly; everyone else goes through approval
  const isPortia = u.email && u.email.toLowerCase() === EMAIL_CFG.approverEmail.toLowerCase();
  const newStatus = id && existing ? existing.status : (isPortia ? 'approved' : 'pending');
  const data = {
    id: id || uid('t'),
    date: document.getElementById('t-date').value,
    day: fmtDay(document.getElementById('t-date').value),
    from: document.getElementById('t-from').value,
    to: document.getElementById('t-to').value,
    location: document.getElementById('t-location').value.trim(),
    distributor: document.getElementById('t-distributor').value.trim(),
    supplier: document.getElementById('t-supplier').value.trim(),
    rep: document.getElementById('t-rep').value.trim(),
    products,
    status: newStatus,
    approvalNote: existing ? existing.approvalNote : '',
    suggestedDate: '', suggestedFrom: '', suggestedTo: '', suggestedLocation: '',
    submittedBy: id && existing ? existing.submittedBy : u.id,
    submittedAt: id && existing ? existing.submittedAt : new Date().toISOString(),
    source: id && existing ? (existing.source || 'employee') : 'employee',
    requesterName: id && existing ? (existing.requesterName || '') : '',
    requesterEmail: id && existing ? (existing.requesterEmail || '') : '',
    requesterCompany: id && existing ? (existing.requesterCompany || '') : '',
  };
  if (id) {
    const idx = DB.tastings.findIndex(x => x.id === id);
    if (idx >= 0) DB.tastings[idx] = data;
    _sbUpsert('tastings', _toDB.tastings(data));
    logTastingAudit(data.id, 'updated', existing, data);
    showToast('Tasting updated', 'success');
  } else {
    DB.tastings.push(data);
    _sbPush('tastings', _toDB.tastings(data));
    logTastingAudit(data.id, 'created', null, data);
    if (isPortia) {
      showToast('Tasting added to schedule ✓', 'success');
    } else {
      emailTastingApproval(data, u.name);
      showToast('Tasting submitted for approval — Portia has been notified 📧', 'info');
    }
  }
  closeModal();
  renderView();
}

function deleteTasting(id) {
  const t = DB.tastings.find(x => x.id === id);
  if (!t) return;
  if (!confirm('Delete tasting on ' + fmtDate(t.date) + ' at ' + t.location + '?')) return;
  logTastingAudit(id, 'deleted', t, null);
  DB.tastings = DB.tastings.filter(x => x.id !== id);
  _sbDelete('tastings', id);
  renderView();
  showToast('Tasting deleted', 'success');
}

// ============ TASTING AUDIT HELPERS ============
function logTastingAudit(tastingId, action, oldData, newData) {
  const u = currentUser();
  const entry = {
    id: uid('ta'),
    tastingId,
    action,
    changedBy: u.id,
    changedByName: u.name,
    changedAt: new Date().toISOString(),
    summary: buildAuditSummary(action, oldData, newData),
    oldData: oldData ? JSON.parse(JSON.stringify(oldData)) : null,
    newData: newData ? JSON.parse(JSON.stringify(newData)) : null,
  };
  DB.tastingAudit.unshift(entry);
  _sbPush('tasting_audit', _toDB.tasting_audit(entry));
}

function buildAuditSummary(action, old, nw) {
  if (action === 'created') return `Added: ${nw.date} at ${nw.location}`;
  if (action === 'deleted') return `Deleted: ${old.date} at ${old.location}`;
  if (action === 'approved') return `Approved: ${nw.date} at ${nw.location}`;
  if (action === 'denied') return `Denied: ${nw.date} at ${nw.location}` + (nw.approvalNote ? ` — "${nw.approvalNote}"` : '');
  if (action === 'rescheduled') return `Reschedule suggested: ${old.date} → ${nw.suggestedDate} at ${nw.location}`;
  if (action === 'updated' && old && nw) {
    const changes = [];
    if (old.date !== nw.date) changes.push(`date ${old.date}→${nw.date}`);
    if (old.location !== nw.location) changes.push(`location "${old.location}"→"${nw.location}"`);
    if (old.from !== nw.from || old.to !== nw.to) changes.push(`time ${old.from}-${old.to}→${nw.from}-${nw.to}`);
    if (old.distributor !== nw.distributor) changes.push(`distributor changed`);
    if (old.supplier !== nw.supplier) changes.push(`supplier changed`);
    return changes.length ? 'Changed: ' + changes.join('; ') : 'Updated (no field changes detected)';
  }
  return action;
}

function tastingApprovalAction(id, action) {
  const t = DB.tastings.find(x => x.id === id);
  if (!t) return;
  const u = currentUser();

  if (action === 'approve') {
    const old = JSON.parse(JSON.stringify(t));
    t.status = 'approved';
    t.approvalNote = '';
    t.suggestedDate = ''; t.suggestedFrom = ''; t.suggestedTo = ''; t.suggestedLocation = '';
    _sbUpdate('tastings', _toDB.tastings(t), id);
    logTastingAudit(id, 'approved', old, t);
    // Notify requester — supplier by email field, employee by their profile email
    const recipientEmail = t.source === 'supplier' ? t.requesterEmail : (t.submittedBy ? (DB.users.find(x=>x.id===t.submittedBy)||{}).email : null);
    const recipientName  = t.source === 'supplier' ? (t.requesterName||'Supplier') : (t.submittedBy ? (DB.users.find(x=>x.id===t.submittedBy)||{}).name : null);
    if (recipientEmail) {
      sendEmail(EMAIL_CFG.templateAnnouncement, {
        to_email: recipientEmail,
        to_name:  recipientName || 'Team',
        subject:  '✅ Tasting request approved — ' + fmtDate(t.date),
        message:  `Great news! The tasting request for ${fmtDate(t.date)} (${fmtTimeRange(t.from,t.to)}) at ${t.location} has been approved and added to the Savon Nexo tasting schedule.\n\nIf you have any questions, please contact us at ${EMAIL_CFG.fromEmail}.`,
        button_label: 'View Tasting Schedule',
        button_url:   EMAIL_CFG.portalUrl + '#tastings',
      });
    }
    showToast('Tasting approved ✓', 'success');
    renderView();

  } else if (action === 'deny') {
    showModal({
      title: '✗ Deny Tasting Request',
      body: `<div class="field"><label class="label">Reason for denial (sent to requester)</label><textarea id="deny-note" rows="3" placeholder="e.g. Date is already fully booked..."></textarea></div>`,
      submitLabel: 'Confirm Denial',
      submitFn: () => {
        const note = document.getElementById('deny-note').value.trim();
        const old = JSON.parse(JSON.stringify(t));
        t.status = 'denied';
        t.approvalNote = note;
        _sbUpdate('tastings', _toDB.tastings(t), id);
        logTastingAudit(id, 'denied', old, t);
        const denyEmail = t.source === 'supplier' ? t.requesterEmail : (t.submittedBy ? (DB.users.find(x=>x.id===t.submittedBy)||{}).email : null);
        const denyName  = t.source === 'supplier' ? (t.requesterName||'Supplier') : (t.submittedBy ? (DB.users.find(x=>x.id===t.submittedBy)||{}).name : null);
        if (denyEmail) {
          sendEmail(EMAIL_CFG.templateAnnouncement, {
            to_email: denyEmail,
            to_name:  denyName || 'Team',
            subject:  'Update on your tasting request — ' + fmtDate(t.date),
            message:  `Thank you for your tasting request for ${fmtDate(t.date)}. Unfortunately we are unable to accommodate this request at this time.${note ? '\n\nNote from Portia: ' + note : ''}\n\nPlease feel free to reach out to us at ${EMAIL_CFG.fromEmail} to find an alternative.`,
            button_label: '',
            button_url:   '',
          });
        }
        closeModal();
        showToast('Tasting denied', 'error');
        renderView();
      }
    });

  } else if (action === 'reschedule') {
    showModal({
      title: '📅 Suggest Reschedule',
      body: `
        <p style="color:var(--slate); margin-bottom:14px;">Suggest an alternative date, time, or location. The requester will see your note.</p>
        <div class="field"><label class="label">Suggested Date</label><input type="date" id="sug-date" value="${t.date}"></div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
          <div class="field"><label class="label">From</label><input type="time" id="sug-from" value="${t.from||''}"></div>
          <div class="field"><label class="label">To</label><input type="time" id="sug-to" value="${t.to||''}"></div>
        </div>
        <div class="field"><label class="label">Suggested Location (optional)</label><input id="sug-loc" placeholder="Leave blank to keep original" value="${t.suggestedLocation||t.location||''}"></div>
        <div class="field"><label class="label">Note to requester</label><textarea id="sug-note" rows="2" placeholder="e.g. Original date conflicts with another event...">${t.approvalNote||''}</textarea></div>
      `,
      submitLabel: 'Send Suggestion',
      submitFn: () => {
        const sugDate = document.getElementById('sug-date').value;
        const sugFrom = document.getElementById('sug-from').value;
        const sugTo   = document.getElementById('sug-to').value;
        const sugLoc  = document.getElementById('sug-loc').value.trim();
        const note    = document.getElementById('sug-note').value.trim();
        if (!sugDate) { showToast('Please enter a suggested date', 'error'); return; }
        const old = JSON.parse(JSON.stringify(t));
        t.status = 'pending';
        t.suggestedDate = sugDate;
        t.suggestedFrom = sugFrom;
        t.suggestedTo   = sugTo;
        t.suggestedLocation = sugLoc;
        t.approvalNote  = note;
        _sbUpdate('tastings', _toDB.tastings(t), id);
        logTastingAudit(id, 'rescheduled', old, t);
        const reschedEmail = t.source === 'supplier' ? t.requesterEmail : (t.submittedBy ? (DB.users.find(x=>x.id===t.submittedBy)||{}).email : null);
        const reschedName  = t.source === 'supplier' ? (t.requesterName||'Supplier') : (t.submittedBy ? (DB.users.find(x=>x.id===t.submittedBy)||{}).name : null);
        if (reschedEmail) {
          sendEmail(EMAIL_CFG.templateAnnouncement, {
            to_email: reschedEmail,
            to_name:  reschedName || 'Team',
            subject:  '📅 Reschedule suggestion for your tasting — ' + fmtDate(t.date),
            message:  `Thank you for your tasting request. Portia has suggested an alternative time:\n\nDate: ${fmtDate(sugDate)}\nTime: ${fmtTimeRange(sugFrom,sugTo)}${sugLoc?'\nLocation: '+sugLoc:''}\n\n${note?'Note: '+note+'\n\n':''}Please reply to ${EMAIL_CFG.fromEmail} to confirm this works for you.`,
            button_label: '',
            button_url:   '',
          });
        }
        closeModal();
        showToast('Reschedule suggestion sent', 'info');
        renderView();
      }
    });
  }
}

// ============ IMPORT FROM GOOGLE SHEET (Excel) ============
function importTastingSheet(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = ''; // reset so same file can be re-imported
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array', cellDates: true });
      const sheetNames = ['ChesterTwin Oaks', 'Edwardsville Waterlou'];
      const parsed = [];

      function excelDate(v) {
        if (!v) return '';
        if (v instanceof Date) return v.getFullYear() + '-' + String(v.getMonth()+1).padStart(2,'0') + '-' + String(v.getDate()).padStart(2,'0');
        if (typeof v === 'string' && /^\d{4}-\d{2}-\d{2}/.test(v)) return v.slice(0,10);
        return '';
      }
      function excelTime(v) {
        if (!v) return '';
        if (v instanceof Date) return String(v.getHours()).padStart(2,'0') + ':' + String(v.getMinutes()).padStart(2,'0');
        if (typeof v === 'number' && v < 1) {
          const mins = Math.round(v * 1440);
          return String(Math.floor(mins/60)).padStart(2,'0') + ':' + String(mins%60).padStart(2,'0');
        }
        if (typeof v === 'string' && /^\d{1,2}:\d{2}/.test(v)) return v.slice(0,5);
        return '';
      }
      function stableId(date, loc, from) {
        return 't_' + date + '_' + (loc||'').toLowerCase().replace(/[^a-z0-9]/g,'_') + '_' + (from||'').replace(':','');
      }

      sheetNames.forEach(name => {
        const ws = wb.Sheets[name];
        if (!ws) return;
        // Headers in row 2, data from row 3 (0-indexed: headers at index 1, data from index 2)
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, cellDates: true, defval: '' });
        const headers = rows[1] || [];
        // Detect if this sheet has a Rep column (Edwardsville has Rep at col 7, products at 8-13)
        const hasRep = (headers[7] || '').toString().toLowerCase().includes('rep');
        const prodStart = hasRep ? 8 : 7;

        rows.slice(2).forEach(row => {
          const rawDate = row[0];
          if (!rawDate) return;
          const date = excelDate(rawDate instanceof Date ? rawDate : new Date(rawDate));
          if (!date || date < '2020-01-01') return; // skip invalid/empty
          const loc   = (row[1] || '').trim();
          const day   = (row[2] || '').trim();
          const from  = excelTime(row[3] instanceof Date ? row[3] : row[3]);
          const to    = excelTime(row[4] instanceof Date ? row[4] : row[4]);
          const dist  = (row[5] || '').trim();
          const supp  = (row[6] || '').trim();
          const rep   = hasRep ? (row[7] || '').trim() : '';
          const prods = [];
          for (let p = prodStart; p < prodStart + 6; p++) {
            const v = (row[p] || '').toString().trim();
            if (v) prods.push(v);
          }
          if (!loc && !dist && !supp) return; // skip blank rows
          parsed.push({
            id: stableId(date, loc, from),
            date, day: day || fmtDay(date),
            from, to,
            location: loc, distributor: dist, supplier: supp, rep,
            products: prods
          });
        });
      });

      if (parsed.length === 0) { showToast('No valid rows found in file', 'error'); return; }

      // Show confirmation modal
      showModal({
        title: '📂 Import Tasting Sheet',
        body: `
          <div style="text-align:center; padding: 12px 0;">
            <div style="font-size: 48px; margin-bottom: 12px;">📊</div>
            <div style="font-size: 22px; font-weight: 700; color: var(--ink); margin-bottom: 6px;">${parsed.length} tastings found</div>
            <div style="color: var(--slate); font-size: 14px; margin-bottom: 20px;">
              From sheets: <strong>ChesterTwin Oaks</strong> &amp; <strong>Edwardsville Waterlou</strong><br>
              Existing tastings with the same date, location &amp; time will be updated. New ones will be added.
            </div>
            <div style="background: var(--warning-light); border-radius: 8px; padding: 12px; font-size: 13px; color: var(--warning); text-align: left;">
              ⚠️ This will replace any matching records already in the portal.
            </div>
          </div>`,
        submitLabel: 'Import ' + parsed.length + ' Tastings',
        submitFn: () => { closeModal(); doImportTastings(parsed); }
      });
    } catch(err) {
      showToast('Error reading file: ' + err.message, 'error');
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

async function doImportTastings(rows) {
  showLoadingOverlay('Importing ' + rows.length + ' tastings…');
  try {
    // Upsert in batches of 200 to stay within Supabase limits
    const batchSize = 200;
    for (let i = 0; i < rows.length; i += batchSize) {
      const batch = rows.slice(i, i + batchSize).map(_toDB.tastings);
      const { error } = await _sb.from('tastings').upsert(batch, { onConflict: 'id' });
      if (error) throw new Error(error.message);
    }
    // Reload tastings from Supabase
    const { data, error: fetchErr } = await _sb.from('tastings').select('*');
    if (fetchErr) throw new Error(fetchErr.message);
    DB.tastings = (data || []).map(_fromDB.tastings);
    hideLoadingOverlay();
    showToast('✅ Imported ' + rows.length + ' tastings successfully', 'success');
    renderView();
  } catch(err) {
    hideLoadingOverlay();
    showToast('Import error: ' + err.message, 'error');
  }
}

function saveEmployee(e, id) {
  e.preventDefault();
  const data = {
    name: document.getElementById('e-name').value.trim(),
    email: document.getElementById('e-email').value.trim(),
    position: document.getElementById('e-position').value.trim(),
    department: document.getElementById('e-department').value.trim(),
    role: document.getElementById('e-role').value,
    managerId: document.getElementById('e-manager').value || null,
    tastingAccess: document.getElementById('e-tasting').checked
  };
  if (id && data.managerId) {
    let m = data.managerId;
    while (m) {
      if (m === id) { showToast('Cannot create circular reporting', 'error'); return; }
      const mgr = DB.users.find(x => x.id === m);
      m = mgr ? mgr.managerId : null;
    }
  }
  const pw = document.getElementById('e-password').value;
  if (id) {
    const u = DB.users.find(x => x.id === id);
    if (u) Object.assign(u, data);
    _sbUpdate('profiles', _toDB.profiles({...u}), id);
    // Password change via Supabase dashboard only for non-self
    if (pw) showToast('Password changes must be done via Supabase dashboard for other users', 'error');
    showToast('Employee updated', 'success');
  } else {
    if (DB.users.find(u => u.email.toLowerCase() === data.email.toLowerCase())) {
      showToast('Email already in use', 'error'); return;
    }
    if (!pw || pw.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }
    // Create auth user + profile via Supabase
    _sb.auth.signUp({ email: data.email, password: pw, options: { data: { name: data.name, role: data.role } } })
      .then(({ data: authData, error }) => {
        if (error) { showToast('Error creating account: ' + error.message, 'error'); return; }
        const newUser = { ...data, id: authData.user.id, active: true, createdAt: todayISO() };
        DB.users.push(newUser);
        // Upsert profile (trigger may have already created a base one)
        _sbUpsert('profiles', _toDB.profiles(newUser));
        showToast('Employee added — they can now log in', 'success');
        renderView();
      });
    closeModal();
    return;
  }
  closeModal();
  renderView();
}

// ============ EXCEL EXPORT ============
function downloadExcel(rows, filename, sheetName) {
  if (!sheetName) sheetName = 'Sheet1';
  if (!rows || rows.length === 0) { showToast('Nothing to export', 'error'); return; }
  const ws = XLSX.utils.json_to_sheet(rows);
  const keys = Object.keys(rows[0]);
  ws['!cols'] = keys.map(k => {
    const maxLen = Math.max(k.length, ...rows.map(r => String(r[k] || '').length));
    return { wch: Math.min(maxLen + 2, 32) };
  });
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, sheetName.slice(0, 30));
  XLSX.writeFile(wb, filename);
  showToast('Exported: ' + filename, 'success');
}

  setTimeout(() => t.classList.remove('show'), 2400);
}
